<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily View</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: #fff;
  font-family: Arial, Helvetica, sans-serif;
  color: #000;
}

.viewer {
  width: 100%;
  max-width: 1536px;
  margin: 0 auto;
  padding: clamp(20px, 3vw, 36px) clamp(20px, 5vw, 70px);
}

.title {
  text-align: center;
  font-size: clamp(2.5rem, 5vw, 4.4rem);
  line-height: 1;
  font-weight: 900;
  color: #08245f;
  margin: 0 0 20px;
}

.top {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 20px;
}

.day {
  font-size: clamp(2rem, 4vw, 4.5rem);
  font-weight: 900;
  letter-spacing: -0.03em;
}

.date {
  font-size: clamp(1.2rem, 2.2vw, 2.4rem);
  font-weight: 900;
  margin-top: 10px;
}

.time-block {
  text-align: right;
}

.time {
  font-size: clamp(2rem, 4vw, 4.5rem);
  font-weight: 900;
}

.period {
  font-size: clamp(1.2rem, 2.2vw, 2.4rem);
  font-weight: 900;
  margin-top: 10px;
}

.sun-icon {
  width: min(260px, 20vw);
  aspect-ratio: 260 / 170;
  position: relative;
  margin: 0 auto;
}

.sun {
  width: 36%;
  height: 55%;
  background: #ff7900;
  border-radius: 50%;
  position: absolute;
  left: 32%;
  top: 22%;
}

.horizon {
  position: absolute;
  left: 13%;
  top: 70%;
  width: 74%;
  height: 30%;
  border-top: 10px solid #08245f;
  border-radius: 50% 50% 0 0;
}

.ray {
  position: absolute;
  background: #ff7900;
  width: 2%;
  height: 20%;
  border-radius: 3px;
}

.r1 { left: 49%; top: 0; }
.r2 { left: 25%; top: 13%; transform: rotate(-42deg); }
.r3 { right: 25%; top: 13%; transform: rotate(42deg); }
.r4 { left: 17%; top: 48%; transform: rotate(90deg); }
.r5 { right: 17%; top: 48%; transform: rotate(90deg); }

.cloud {
  position: absolute;
  width: 22%;
  height: 14%;
  background: #93bce9;
  border-radius: 18px 18px 6px 6px;
  top: 47%;
}

.cloud:before {
  content: "";
  position: absolute;
  width: 60%;
  height: 140%;
  background: #93bce9;
  border-radius: 50%;
  left: 20%;
  top: -70%;
}

.cloud.left { left: -4%; }
.cloud.right { right: -4%; }

.main {
  display: grid;
  grid-template-columns: 1.15fr 0.85fr;
  gap: clamp(24px, 4vw, 78px);
  margin-top: clamp(30px, 4vw, 58px);
}

.today-title {
  font-size: clamp(1.5rem, 2.5vw, 2.25rem);
  font-weight: 900;
  margin-bottom: 14px;
}

.event {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 20px;
  min-height: 110px;
  border-bottom: 2px solid #e5e5e5;
  padding: 10px 0;
}

.event:last-child {
  border-bottom: none;
}

.circle {
  width: clamp(60px, 7vw, 106px);
  height: clamp(60px, 7vw, 106px);
  border-radius: 50%;
  display: grid;
  place-items: center;
  font-size: clamp(1.5rem, 3vw, 3.4rem);
}

.hair {
  background: #f1f1f1;
  color: #444;
}

.people {
  background: #eee9ff;
  color: #4521a8;
}

.home {
  background: #fff1cf;
  color: #dd9400;
}

.event-name {
  font-size: clamp(1.2rem, 2.4vw, 2.4rem);
  font-weight: 800;
}

.event-time {
  font-size: clamp(1.2rem, 2.4vw, 2.4rem);
  font-weight: 800;
  text-align: right;
}

.past {
  color: #7b7b82;
}

.current {
  color: #000;
}

.next-card {
  background: #f1f5ff;
  border-radius: 24px;
  padding: clamp(24px, 3vw, 42px);
}

.next-label {
  color: #0b4df0;
  font-size: clamp(1.4rem, 2.5vw, 2.4rem);
  font-weight: 900;
  margin-bottom: 20px;
}

.next-item {
  font-size: clamp(2rem, 4vw, 4.5rem);
  font-weight: 900;
  letter-spacing: -0.03em;
  margin-bottom: 20px;
}

.next-time {
  color: #0b4df0;
  font-size: clamp(1.5rem, 3vw, 2.8rem);
  font-weight: 900;
}

/* Tablet */

@media (max-width: 900px) {
  .main {
    grid-template-columns: 1fr;
  }

  .next-card {
    margin-top: 20px;
  }
}

/* Mobile */

@media (max-width: 640px) {

  .top {
    grid-template-columns: 1fr;
    text-align: center;
  }

  .time-block {
    text-align: center;
  }

  .event {
    grid-template-columns: 70px 1fr;
  }

  .event-time {
    grid-column: 2;
    text-align: left;
  }
}
</style>

</head>

<body>

<main class="viewer">

  <h1 class="title">Daily View</h1>

  <section class="top">

    <div>
      <div class="day">TUESDAY</div>
      <div class="date">25 APRIL 2024</div>
    </div>

    <div class="sun-icon">
      <div class="ray r1"></div>
      <div class="ray r2"></div>
      <div class="ray r3"></div>
      <div class="ray r4"></div>
      <div class="ray r5"></div>
      <div class="cloud left"></div>
      <div class="cloud right"></div>
      <div class="sun"></div>
      <div class="horizon"></div>
    </div>

    <div class="time-block">
      <div class="time">14:05</div>
      <div class="period">AFTERNOON</div>
    </div>

  </section>

  <section class="main">

    <div>

      <div class="today-title">TODAY</div>

      <div class="event past">
        <div class="circle hair">✂</div>
        <div class="event-name">Hair appointment</div>
        <div class="event-time">11:00</div>
      </div>

      <div class="event past">
        <div class="circle people">👥</div>
        <div class="event-name">Lunch with Sarah</div>
        <div class="event-time">13:00</div>
      </div>

      <div class="event current">
        <div class="circle home">⌂</div>
        <div class="event-name">Carer visit</div>
        <div class="event-time">16:00</div>
      </div>

    </div>

    <aside class="next-card">
      <div class="next-label">NEXT</div>
      <div class="next-item">Carer visit</div>
      <div class="next-time">at 16:00</div>
    </aside>

  </section>

</main>

</body>
</html>
